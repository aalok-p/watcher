version: '3.8'

services:
  watcher:
    build: .
    container_name: watcher
    ports:
      - "8000:8000"
    environment:
      POLL_INTERVAL_SEC: 3
      SCREENSHOT_ENABLED: "true"
      PORT: 8000
      
      # Openai config
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-key-here}
      OPENAI_BASE_URL: https://api.openai.com/v1
      OPENAI_MODEL: yourmodelname
      
      #when using nvidia-docker for nvidia gpu
      NVIDIA_VISIBLE_DEVICES: all
    
    # enable for nvidia GPU on Linux (default NVIDIA-GPU)
    runtime: nvidia
    
    # For Docker Desktop on Mac/Windows with GPU support - Uncomment if needed
    # device_requests:
    #   - driver: nvidia
    #     count: 1
    #     capabilities: [gpu]
    
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
